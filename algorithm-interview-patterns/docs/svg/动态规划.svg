<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfccb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#166534">动态规划</text>
  <text x="90" y="140" font-size="20" fill="#15803d">像一本发光的状态账本，每个格子都记下一个子问题答案</text>
  <g transform="translate(180,190)">
    <rect x="0" y="0" width="520" height="360" rx="24" fill="#f7fee7" stroke="#84cc16" stroke-width="4"/>
    <g stroke="#a3e635" stroke-width="2">
      <line x1="0" y1="72" x2="520" y2="72"/><line x1="0" y1="144" x2="520" y2="144"/><line x1="0" y1="216" x2="520" y2="216"/><line x1="0" y1="288" x2="520" y2="288"/>
      <line x1="104" y1="0" x2="104" y2="360"/><line x1="208" y1="0" x2="208" y2="360"/><line x1="312" y1="0" x2="312" y2="360"/><line x1="416" y1="0" x2="416" y2="360"/>
    </g>
    <g font-size="28" font-weight="700" text-anchor="middle" fill="#166534">
      <text x="52" y="46">1</text><text x="156" y="46">1</text><text x="260" y="46">2</text><text x="364" y="46">3</text><text x="468" y="46">5</text>
      <text x="52" y="118">1</text><text x="156" y="118">2</text><text x="260" y="118">3</text><text x="364" y="118">5</text><text x="468" y="118">8</text>
      <text x="52" y="190">2</text><text x="156" y="190">3</text><text x="260" y="190">5</text><text x="364" y="190">8</text><text x="468" y="190">13</text>
    </g>
    <rect x="312" y="144" width="104" height="72" fill="#dcfce7" stroke="#16a34a" stroke-width="5" rx="16"/>
    <line x1="260" y1="180" x2="305" y2="180" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="364" y1="130" x2="364" y2="140" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="560" y="120" font-size="24" fill="#166534">当前答案</text>
    <text x="560" y="160" font-size="24" fill="#166534">由之前格子</text>
    <text x="560" y="200" font-size="24" fill="#166534">一步步推导</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#dcfce7"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#15803d">状态表</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#ecfccb"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#4d7c0f">转移关系</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#f0fdf4"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#166534">重复子问题</text>
  </g>
</svg>
