<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#ca8a04"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#fde68a"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#854d0e">贪心</text>
  <text x="90" y="140" font-size="20" fill="#a16207">像旅行者一路挑眼前最值钱的金币，关键是这种挑法不会后悔</text>
  <g transform="translate(120,220)">
    <path d="M60 260 C180 180, 280 300, 420 220 C540 150, 640 260, 760 160 C840 100, 930 130, 1010 70" fill="none" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
    <g fill="#facc15" stroke="#ca8a04" stroke-width="4">
      <circle cx="180" cy="205" r="28"/><circle cx="320" cy="255" r="22"/><circle cx="460" cy="200" r="34"/>
      <circle cx="620" cy="220" r="24"/><circle cx="760" cy="160" r="40"/><circle cx="930" cy="100" r="30"/>
    </g>
    <g font-size="24" font-weight="700" text-anchor="middle" fill="#854d0e">
      <text x="180" y="213">5</text><text x="320" y="263">2</text><text x="460" y="208">8</text><text x="620" y="228">3</text><text x="760" y="168">10</text><text x="930" y="108">6</text>
    </g>
    <circle cx="90" cy="270" r="34" fill="#60a5fa"/>
    <rect x="70" y="280" width="40" height="90" rx="18" fill="#2563eb"/>
    <line x1="110" y1="260" x2="180" y2="215" stroke="#ca8a04" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="180" y1="215" x2="460" y2="205" stroke="#ca8a04" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="460" y1="205" x2="760" y2="165" stroke="#ca8a04" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="760" y="320" font-size="28" font-weight="700" fill="#854d0e">每一步都选眼前最优</text>
    <text x="760" y="360" font-size="24" fill="#a16207">前提：局部最优能通向全局最优</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#fef3c7"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#a16207">局部最优</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#fde68a"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#92400e">不回头</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#fff7ed"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#9a3412">规则正确</text>
  </g>
