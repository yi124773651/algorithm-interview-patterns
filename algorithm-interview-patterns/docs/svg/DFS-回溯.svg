<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#fdf4ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#5b21b6">DFS / 回溯</text>
  <text x="90" y="140" font-size="20" fill="#6d28d9">像探险者沿着决策树一路深入，走到尽头再退回来换分支</text>
  <g transform="translate(160,190)">
    <line x1="390" y1="40" x2="220" y2="150" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="390" y1="40" x2="560" y2="150" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="220" y1="150" x2="120" y2="280" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="220" y1="150" x2="300" y2="280" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="560" y1="150" x2="480" y2="280" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="560" y1="150" x2="650" y2="280" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="300" y1="280" x2="240" y2="400" stroke="#c4b5fd" stroke-width="6"/>
    <line x1="300" y1="280" x2="360" y2="400" stroke="#c4b5fd" stroke-width="6"/>
    <g fill="#ffffff" stroke="#8b5cf6" stroke-width="4">
      <circle cx="390" cy="40" r="28"/><circle cx="220" cy="150" r="28"/><circle cx="560" cy="150" r="28"/>
      <circle cx="120" cy="280" r="28"/><circle cx="300" cy="280" r="28"/><circle cx="480" cy="280" r="28"/><circle cx="650" cy="280" r="28"/>
      <circle cx="240" cy="400" r="28"/><circle cx="360" cy="400" r="28"/>
    </g>
    <path d="M390 40 L220 150 L300 280 L360 400" fill="none" stroke="#7c3aed" stroke-width="8" marker-end="url(#arrow)"/>
    <path d="M360 400 Q320 420 300 280 Q270 220 220 150" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
    <circle cx="390" cy="40" r="14" fill="#7c3aed"/>
    <circle cx="220" cy="150" r="14" fill="#7c3aed"/>
    <circle cx="300" cy="280" r="14" fill="#7c3aed"/>
    <circle cx="360" cy="400" r="14" fill="#7c3aed"/>
    <text x="430" y="430" font-size="24" fill="#5b21b6">深入到底</text>
    <text x="160" y="450" font-size="24" fill="#b91c1c">撤销选择，回头换路</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#ede9fe"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#6d28d9">决策树</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#f5d0fe"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#a21caf">做与撤销</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#fee2e2"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#b91c1c">换分支</text>
  </g>
</svg>
