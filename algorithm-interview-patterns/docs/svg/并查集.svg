<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#fecaca"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#991b1b">并查集</text>
  <text x="90" y="140" font-size="20" fill="#b91c1c">像许多小树不断接到共同树根上，根节点代表整个连通块</text>
  <g transform="translate(150,210)">
    <circle cx="240" cy="80" r="30" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
    <circle cx="720" cy="80" r="30" fill="#fed7aa" stroke="#ea580c" stroke-width="4"/>
    <line x1="240" y1="110" x2="170" y2="210" stroke="#f87171" stroke-width="6"/>
    <line x1="240" y1="110" x2="240" y2="210" stroke="#f87171" stroke-width="6"/>
    <line x1="240" y1="110" x2="310" y2="210" stroke="#f87171" stroke-width="6"/>
    <line x1="720" y1="110" x2="650" y2="210" stroke="#fb923c" stroke-width="6"/>
    <line x1="720" y1="110" x2="720" y2="210" stroke="#fb923c" stroke-width="6"/>
    <line x1="720" y1="110" x2="790" y2="210" stroke="#fb923c" stroke-width="6"/>
    <g fill="#ffffff" stroke-width="4">
      <circle cx="170" cy="210" r="24" stroke="#dc2626"/><circle cx="240" cy="210" r="24" stroke="#dc2626"/><circle cx="310" cy="210" r="24" stroke="#dc2626"/>
      <circle cx="650" cy="210" r="24" stroke="#ea580c"/><circle cx="720" cy="210" r="24" stroke="#ea580c"/><circle cx="790" cy="210" r="24" stroke="#ea580c"/>
    </g>
    <line x1="360" y1="140" x2="600" y2="140" stroke="#dc2626" stroke-width="8" stroke-dasharray="18 12" marker-end="url(#arrow)"/>
    <text x="470" y="120" text-anchor="middle" font-size="28" font-weight="700" fill="#991b1b">union：两棵树合并</text>
    <circle cx="480" cy="330" r="34" fill="#dc2626"/>
    <line x1="480" y1="296" x2="240" y2="110" stroke="#dc2626" stroke-width="7"/>
    <line x1="480" y1="296" x2="720" y2="110" stroke="#dc2626" stroke-width="7"/>
    <text x="480" y="338" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">根</text>
    <text x="420" y="410" font-size="26" fill="#991b1b">同根就表示在同一组</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#fee2e2"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#b91c1c">查找根</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#fecaca"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#991b1b">动态合并</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#ffedd5"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#c2410c">连通块</text>
  </g>
</svg>
