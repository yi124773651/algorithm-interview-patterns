<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#bae6fd"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#0c4a6e">BFS 广度优先搜索</text>
  <text x="90" y="140" font-size="20" fill="#155e75">像石子落水，搜索前沿一层一层向外扩散，先到就更近</text>
  <g transform="translate(250,190)">
    <circle cx="300" cy="180" r="30" fill="#2563eb"/>
    <text x="300" y="188" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">起点</text>
    <circle cx="300" cy="180" r="80" fill="none" stroke="#60a5fa" stroke-width="8"/>
    <circle cx="300" cy="180" r="150" fill="none" stroke="#7dd3fc" stroke-width="8" stroke-dasharray="18 12"/>
    <circle cx="300" cy="180" r="220" fill="none" stroke="#a5f3fc" stroke-width="8" stroke-dasharray="10 10"/>
    <g fill="#ffffff" stroke="#0891b2" stroke-width="3">
      <circle cx="300" cy="100" r="24"/><circle cx="380" cy="180" r="24"/><circle cx="300" cy="260" r="24"/><circle cx="220" cy="180" r="24"/>
      <circle cx="405" cy="105" r="24"/><circle cx="455" cy="230" r="24"/><circle cx="195" cy="285" r="24"/><circle cx="135" cy="130" r="24"/>
      <circle cx="520" cy="180" r="24"/><circle cx="80" cy="180" r="24"/><circle cx="300" cy="400" r="24"/><circle cx="300" cy="-40" r="24"/>
    </g>
    <g font-size="18" font-weight="700" text-anchor="middle" fill="#0f172a">
      <text x="300" y="107">1</text><text x="380" y="187">1</text><text x="300" y="267">1</text><text x="220" y="187">1</text>
      <text x="405" y="112">2</text><text x="455" y="237">2</text><text x="195" y="292">2</text><text x="135" y="137">2</text>
      <text x="520" y="187">3</text><text x="80" y="187">3</text><text x="300" y="407">3</text><text x="300" y="-33">3</text>
    </g>
  </g>
  <g transform="translate(850,240)">
    <rect x="0" y="0" width="220" height="180" rx="24" fill="#f0f9ff" stroke="#7dd3fc"/>
    <text x="110" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0c4a6e">分层扩散</text>
    <text x="24" y="82" font-size="22" fill="#164e63">• 第 0 层：起点</text>
    <text x="24" y="116" font-size="22" fill="#164e63">• 第 1 层：一步可达</text>
    <text x="24" y="150" font-size="22" fill="#164e63">• 第 2 层：两步可达</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#dbeafe"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#1d4ed8">分层搜索</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#cffafe"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#0f766e">最短步数</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#e0f2fe"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#0369a1">搜索前沿</text>
  </g>
</svg>
