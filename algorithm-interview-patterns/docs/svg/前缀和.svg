<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#99f6e4"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#115e59">前缀和</text>
  <text x="90" y="140" font-size="20" fill="#0f766e">像一路立下里程碑记账，后面任何区间都能拿两个历史量做差</text>
  <g transform="translate(120,250)">
    <line x1="40" y1="250" x2="980" y2="250" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
    <g fill="#ccfbf1" stroke="#14b8a6" stroke-width="3">
      <circle cx="120" cy="250" r="28"/><circle cx="260" cy="250" r="28"/><circle cx="400" cy="250" r="28"/>
      <circle cx="540" cy="250" r="28"/><circle cx="680" cy="250" r="28"/><circle cx="820" cy="250" r="28"/>
    </g>
    <g font-size="22" font-weight="700" text-anchor="middle" fill="#115e59">
      <text x="120" y="256">0</text><text x="260" y="256">3</text><text x="400" y="256">8</text><text x="540" y="256">10</text><text x="680" y="256">17</text><text x="820" y="256">21</text>
    </g>
    <line x1="400" y1="160" x2="400" y2="230" stroke="#0f766e" stroke-width="5"/>
    <line x1="820" y1="160" x2="820" y2="230" stroke="#0f766e" stroke-width="5"/>
    <line x1="400" y1="130" x2="820" y2="130" stroke="#0f766e" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="610" y="110" text-anchor="middle" font-size="24" font-weight="700" fill="#115e59">区间和 = 前缀[右] - 前缀[左]</text>
    <rect x="905" y="90" width="120" height="70" rx="20" fill="#ccfbf1" stroke="#14b8a6"/>
    <text x="965" y="132" text-anchor="middle" font-size="26" font-weight="700" fill="#115e59">21 - 8</text>
    <rect x="930" y="190" width="70" height="54" rx="16" fill="#14b8a6"/>
    <text x="965" y="225" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">13</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#ccfbf1"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#0f766e">历史累计</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#99f6e4"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#0f766e">快速区间和</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#ecfeff"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#115e59">两点做差</text>
  </g>
</svg>
