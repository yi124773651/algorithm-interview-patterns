<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="648" rx="32" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="100" font-size="34" font-weight="700" fill="#0f172a">栈 / 单调栈</text>
  <text x="90" y="140" font-size="20" fill="#334155">像候选人排队等待筛选，新来的更强，旧的弱者就立刻出队</text>
  <g transform="translate(130,210)">
    <rect x="160" y="90" width="200" height="300" rx="22" fill="#e2e8f0" stroke="#64748b" stroke-width="4"/>
    <rect x="190" y="310" width="140" height="50" rx="16" fill="#94a3b8"/>
    <rect x="190" y="250" width="140" height="50" rx="16" fill="#a5b4fc"/>
    <rect x="190" y="190" width="140" height="50" rx="16" fill="#c4b5fd"/>
    <rect x="190" y="130" width="140" height="50" rx="16" fill="#ddd6fe"/>
    <text x="260" y="164" text-anchor="middle" font-size="24" font-weight="700" fill="#312e81">7</text>
    <text x="260" y="224" text-anchor="middle" font-size="24" font-weight="700" fill="#312e81">5</text>
    <text x="260" y="284" text-anchor="middle" font-size="24" font-weight="700" fill="#312e81">3</text>
    <text x="260" y="344" text-anchor="middle" font-size="24" font-weight="700" fill="#312e81">1</text>
    <circle cx="560" cy="170" r="34" fill="#f59e0b"/>
    <text x="560" y="178" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">6</text>
    <line x1="520" y1="170" x2="360" y2="170" stroke="#0f172a" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="330" y1="215" x2="450" y2="105" stroke="#ef4444" stroke-width="6" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
    <text x="470" y="100" font-size="24" fill="#b91c1c">旧候选失去价值，出栈</text>
    <text x="440" y="240" font-size="26" font-weight="700" fill="#0f172a">栈里只保留还可能有用的人</text>
  </g>
  <g transform="translate(90,610)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="#e2e8f0"/><text x="75" y="30" text-anchor="middle" font-size="20" fill="#334155">先进后出</text>
    <rect x="170" y="0" width="150" height="46" rx="23" fill="#ddd6fe"/><text x="245" y="30" text-anchor="middle" font-size="20" fill="#6d28d9">候选淘汰</text>
    <rect x="340" y="0" width="150" height="46" rx="23" fill="#fee2e2"/><text x="415" y="30" text-anchor="middle" font-size="20" fill="#b91c1c">保持单调</text>
  </g>
</svg>
